services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dirham
      POSTGRES_USER: dirham
      POSTGRES_PASSWORD: dirham
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dirham"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8010:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: dev-secret-key-not-for-production
      DB_NAME: dirham
      DB_USER: dirham
      DB_PASSWORD: dirham
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
